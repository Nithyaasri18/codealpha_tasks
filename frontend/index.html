<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopVault — Curated Objects for Modern Living</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>

<!-- ── LOADER ── -->
<div id="loader">
  <div class="loader-inner">
    <span class="loader-word">SHOP</span>
    <span class="loader-word accent">VAULT</span>
  </div>
</div>

<!-- ── NAVBAR ── -->
<nav id="navbar">
  <div class="nav-left">
    <a href="#" class="logo" onclick="navigate('home')">
      <span>SHOP</span><span class="logo-accent">VAULT</span>
    </a>
  </div>
  <div class="nav-center">
    <a class="nav-link" onclick="navigate('home')">Shop</a>
    <a class="nav-link" onclick="navigate('home')">Collections</a>
    <a class="nav-link" onclick="navigate('home')">About</a>
  </div>
  <div class="nav-right">
    <button class="nav-icon" id="searchBtn" title="Search">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </button>
    <button class="nav-icon" onclick="navigate('account')" title="Account">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
    <button class="nav-icon cart-btn" onclick="toggleCart()" title="Cart">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
      <span class="cart-badge" id="cartBadge">0</span>
    </button>
  </div>
</nav>

<!-- ── SEARCH BAR ── -->
<div id="searchBar" class="search-overlay hidden">
  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search products…" oninput="handleSearch(this.value)">
    <button onclick="closeSearch()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
</div>

<!-- ── CART DRAWER ── -->
<div id="cartOverlay" class="cart-overlay hidden" onclick="toggleCart()"></div>
<div id="cartDrawer" class="cart-drawer">
  <div class="cart-header">
    <h3>Your Cart <span id="cartCount"></span></h3>
    <button onclick="toggleCart()">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-footer" id="cartFooter"></div>
</div>

<!-- ── PAGES ── -->
<main id="app"></main>

<!-- ── TOAST ── -->
<div id="toast"></div>

<script src="/js/app.js"></script>
</body>
</html>
